# Cloudflare Worker — Universal SSR for public routes
# Forwards /:slug, /:slug/services/:s, /:slug/events/:e, /, /pricing, /gallery, /experts/*
# to the Supabase edge function `generate-sitemap/ssr/...` so Google, Yandex,
# Facebook, Telegram, WhatsApp, LinkedIn and AI crawlers see full HTML with
# per-page <title>, meta description, canonical, OG, Twitter Card and JSON-LD.
#
# Docs: ./README.md  |  Activation runbook: ../docs/seo/CLOUDFLARE_WORKER_DEPLOY.md

name = "lnkmx-ssr-worker"
main = "prerender-worker.js"
compatibility_date = "2024-10-01"

# Production routes — domain must be Proxied (orange cloud) in Cloudflare DNS.
# Comment these out if you keep DNS-Only.
routes = [
  { pattern = "lnkmx.my/*", zone_name = "lnkmx.my" },
  { pattern = "www.lnkmx.my/*", zone_name = "lnkmx.my" },
]

# Non-secret config; secrets (SUPABASE_PROJECT, SUPABASE_ANON_KEY) are set via:
#   wrangler secret put SUPABASE_PROJECT
#   wrangler secret put SUPABASE_ANON_KEY
[vars]
# SUPABASE_PROJECT and SUPABASE_ANON_KEY are populated as secrets in CI/CD.

[observability]
enabled = true

[dev]
port = 8787
local_protocol = "http"
