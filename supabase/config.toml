[auth]
enable_manual_linking = true

# ──────────────────────────────────────────────────────────────
# Edge Functions JWT Configuration
#
# verify_jwt = false  → public endpoint, no auth required
# verify_jwt = true   → requires valid Supabase JWT in Authorization header
#
# Functions that accept external webhooks or public traffic MUST
# implement their own auth (API key, signature verification, etc.)
# ──────────────────────────────────────────────────────────────

# --- AI / Content generation (called from authenticated frontend, but uses service_role internally) ---
