name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:

  editor-sheet-changes:
    name: Detect Editor Sheet Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      editor_sheet_changed: ${{ steps.filter.outputs.editor_sheet }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            editor_sheet:
              - 'src/components/editor/**'
              - 'src/components/ui/sheet.tsx'

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Hardened Quality Gate
        run: npm run quality:check

  unit-tests:
    name: Unit Tests (with Coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:ci

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality, unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: E2E tests
        run: npm run e2e:ci


  editor-sheet-e2e:
    name: Editor Sheet E2E (Required on editor/sheet PR changes)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality, unit-tests, editor-sheet-changes]
    if: github.event_name == 'pull_request' && needs.editor-sheet-changes.outputs.editor_sheet_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
  editor-sheet-required:
    name: Editor Add-Block Sheet Check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect editor changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            editor:
              - 'src/components/editor/**'

      - name: Setup Node
        if: steps.changes.outputs.editor == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run add-block sheet e2e (desktop + mobile)
        run: npx playwright test e2e/add-block-sheet.spec.ts --project=chromium --reporter=line
        if: steps.changes.outputs.editor == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.changes.outputs.editor == 'true'
        run: npx playwright install --with-deps chromium

      - name: Editor add-block sheet scenarios (desktop + mobile)
        if: steps.changes.outputs.editor == 'true'
        run: npx playwright test e2e/editor-add-block-sheet.spec.ts --project=chromium --project="Mobile Chrome"

      - name: No editor changes
        if: steps.changes.outputs.editor != 'true'
        run: echo "No changes in src/components/editor/**; required check passes."

  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
