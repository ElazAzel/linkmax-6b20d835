name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:

  editor-sheet-changes:
    name: Detect Editor Sheet Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      editor_sheet_changed: ${{ steps.filter.outputs.editor_sheet }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            editor_sheet:
              - 'src/components/editor/**'
              - 'src/components/ui/sheet.tsx'

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: i18n lint
        run: npm run lint:i18n

      - name: i18n key alignment
        run: npm run i18n:check

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Dependency quality gate
        run: npm run quality:gate

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality, unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: E2E tests
        run: npm run e2e:ci


  editor-sheet-e2e:
    name: Editor Sheet E2E (Required on editor/sheet PR changes)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality, unit-tests, editor-sheet-changes]
    if: github.event_name == 'pull_request' && needs.editor-sheet-changes.outputs.editor_sheet_changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run add-block sheet e2e (desktop + mobile)
        run: npx playwright test e2e/add-block-sheet.spec.ts --project=chromium --reporter=line

  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
