name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: i18n lint
        run: npm run lint:i18n

      - name: i18n key alignment
        run: npm run i18n:check

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Dependency quality gate
        run: npm run quality:gate

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality, unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: E2E tests
        run: npm run e2e:ci

  editor-sheet-required:
    name: Editor Add-Block Sheet Check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect editor changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            editor:
              - 'src/components/editor/**'

      - name: Setup Node
        if: steps.changes.outputs.editor == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.changes.outputs.editor == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.changes.outputs.editor == 'true'
        run: npx playwright install --with-deps chromium

      - name: Editor add-block sheet scenarios (desktop + mobile)
        if: steps.changes.outputs.editor == 'true'
        run: npx playwright test e2e/editor-add-block-sheet.spec.ts --project=chromium --project="Mobile Chrome"

      - name: No editor changes
        if: steps.changes.outputs.editor != 'true'
        run: echo "No changes in src/components/editor/**; required check passes."

  build:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
