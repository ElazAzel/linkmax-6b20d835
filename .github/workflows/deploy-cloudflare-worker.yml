name: Deploy Cloudflare SSR Worker

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare-worker/**'
      - '.github/workflows/deploy-cloudflare-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare-worker
          command: deploy
          secrets: |
            SUPABASE_PROJECT
            SUPABASE_ANON_KEY
        env:
          SUPABASE_PROJECT: ${{ secrets.CF_WORKER_SUPABASE_PROJECT }}
          SUPABASE_ANON_KEY: ${{ secrets.CF_WORKER_SUPABASE_ANON_KEY }}
